name: Locize
description: >-
  Locize is a localization-as-a-service platform built by the creators of
  i18next that connects developers, product managers, and translators to
  deliver translation updates continuously without requiring app redeployment.
  The platform provides a comprehensive REST API for managing translation
  namespaces, keys, importing and exporting translations, and version
  management across multiple languages and environments. Locize supports
  native i18next integration along with any i18n library and workflow, and
  offers CLI tooling, CDN delivery, AI-assisted translation, and in-context
  editing for a complete developer-friendly localization lifecycle.
