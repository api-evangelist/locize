apis:
  - name: Locize REST API
    description: >-
      The Locize REST API enables developers to programmatically manage
      translation namespaces, keys, languages, and versions. It supports
      fetching and updating translations via CDN endpoints, reporting missing
      or used translation keys, bulk importing and exporting locales, and
      managing project users and tenant configurations.
